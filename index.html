<body>


<nav>

  <div class="logo">NIKE</div>

  <ul>

    <li><a href="#">Women</a></li>
    <li><a href="#">Shoes</a></li>
    <li><a href="#">Contact</a></li>

<section class="hero">

  <div class="hero-content">

    <h1>JUST DO IT</h1>

    <p>Discover The New Collection</p>

  </div>

</section>

    <div class="card">

      <div class="card-content">

        <h3>Air Max</h3>

        <p>$199</p>

      </div>

    </div>


    <div class="card">

      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1000">

      <div class="card-content">

        <h3>Nike Jordan</h3>

        <p>$250</p>

        <button>Buy Now</button>

      </div>

    </div>

    

    <div class="card">

      <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=1000">

      <div class="card-content">

        <h3>Running Pro</h3>

        <p>$180</p>

        <button>Buy Now</button>

      </div>

    </div>

  </div>

</section>


<section class="video-section">

  <h2>Nike Promo Video</h2>

  <video controls autoplay muted loop>

    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

  </video>

</section>



<section class="banner">

  <div class="banner-content">

  </div>

</section>
